<svg viewBox="0 0 610 115" width="610" height="115" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jarFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8DDD8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A8C8C2" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="oatsContents" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A85C"/>
      <stop offset="100%" stop-color="#C09040"/>
    </linearGradient>
    <linearGradient id="herbPot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4593A"/>
      <stop offset="100%" stop-color="#A83C28"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8C5A30"/>
      <stop offset="100%" stop-color="#6A3E1C"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4593A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C4593A" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#C4593A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C4593A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="oliveGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8C5A0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#88A880" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- ── SHELF ── -->
  <rect x="8" y="89" width="132" height="9" rx="2" fill="url(#wood)"/>
  <rect x="8" y="96" width="132" height="4" rx="1" fill="rgba(0,0,0,0.12)"/>
  <!-- Left upright -->
  <rect x="8" y="10" width="8" height="83" rx="2" fill="#7A4A28"/>
  <!-- Right upright -->
  <rect x="132" y="10" width="8" height="83" rx="2" fill="#7A4A28"/>

  <!-- ── TALL MASON JAR (oats) ── -->
  <!-- lid -->
  <rect x="22" y="24" width="30" height="8" rx="2" fill="#C4593A"/>
  <rect x="20" y="30" width="34" height="4" rx="1.5" fill="#A83C28"/>
  <!-- body -->
  <rect x="22" y="33" width="30" height="54" rx="4" fill="url(#jarFill)" stroke="#90BEB5" stroke-width="0.8"/>
  <!-- contents -->
  <rect x="24" y="62" width="26" height="25" fill="url(#oatsContents)" fill-opacity="0.9"/>
  <!-- grain lines -->
  <line x1="28" y1="65" x2="28" y2="85" stroke="#B08840" stroke-width="0.6" stroke-opacity="0.5"/>
  <line x1="33" y1="64" x2="33" y2="86" stroke="#B08840" stroke-width="0.6" stroke-opacity="0.5"/>
  <line x1="38" y1="65" x2="38" y2="85" stroke="#B08840" stroke-width="0.6" stroke-opacity="0.5"/>
  <!-- glass highlight -->
  <rect x="24" y="35" width="5" height="46" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <!-- label -->
  <rect x="25" y="50" width="24" height="13" rx="1.5" fill="#F5EDD8" fill-opacity="0.95"/>
  <text x="37" y="60" text-anchor="middle" font-size="5.5" fill="#5C3A1E"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,serif" letter-spacing="0.3">OATS</text>

  <!-- ── SHORT HONEY JAR ── -->
  <rect x="59" y="44" width="26" height="7" rx="2" fill="#D4A85C"/>
  <rect x="57" y="49" width="30" height="3" rx="1.5" fill="#B08840"/>
  <rect x="59" y="51" width="26" height="37" rx="4" fill="url(#jarFill)" stroke="#90BEB5" stroke-width="0.8"/>
  <!-- honey -->
  <rect x="61" y="69" width="22" height="19" rx="0" fill="#F5C842" fill-opacity="0.88"/>
  <rect x="61" y="53" width="5" height="31" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <!-- label -->
  <rect x="62" y="60" width="20" height="10" rx="1.5" fill="#F5EDD8" fill-opacity="0.95"/>
  <text x="72" y="68" text-anchor="middle" font-size="4.8" fill="#5C3A1E"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,serif">HONEY</text>

  <!-- ── OLIVE OIL BOTTLE ── -->
  <!-- cork -->
  <rect x="93" y="14" width="10" height="7" rx="2" fill="#C4A060"/>
  <!-- neck -->
  <rect x="92" y="20" width="12" height="10" rx="3" fill="url(#oliveGlass)" stroke="#7A9E7E" stroke-width="0.8"/>
  <!-- shoulder -->
  <rect x="90" y="29" width="16" height="8" rx="3" fill="url(#oliveGlass)" stroke="#7A9E7E" stroke-width="0.8"/>
  <!-- body -->
  <rect x="88" y="36" width="20" height="52" rx="4" fill="url(#oliveGlass)" stroke="#7A9E7E" stroke-width="0.8"/>
  <!-- olive oil inside -->
  <rect x="90" y="54" width="16" height="34" rx="2" fill="#7A9E7E" fill-opacity="0.65"/>
  <!-- highlight -->
  <rect x="90" y="38" width="4" height="44" rx="2" fill="rgba(255,255,255,0.26)"/>
  <!-- label -->
  <rect x="90" y="46" width="16" height="10" rx="1.5" fill="#F5EDD8" fill-opacity="0.9"/>
  <text x="98" y="54" text-anchor="middle" font-size="4" fill="#3A5C30"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,serif">OLIVE OIL</text>

  <!-- ── HERB POT ── -->
  <!-- pot body -->
  <path d="M 118 89 L 114 68 L 136 68 L 132 89 Z" fill="url(#herbPot)"/>
  <!-- rim -->
  <rect x="112" y="64" width="26" height="6" rx="1.5" fill="#A83C28"/>
  <!-- soil -->
  <ellipse cx="125" cy="68" rx="11" ry="3.5" fill="#3A2210"/>
  <!-- stems -->
  <line x1="125" y1="68" x2="120" y2="44" stroke="#6B8C5E" stroke-width="1.5"/>
  <line x1="125" y1="68" x2="130" y2="46" stroke="#6B8C5E" stroke-width="1.5"/>
  <line x1="123" y1="57" x2="115" y2="50" stroke="#6B8C5E" stroke-width="1.1"/>
  <line x1="127" y1="54" x2="135" y2="48" stroke="#6B8C5E" stroke-width="1.1"/>
  <!-- leaves -->
  <ellipse cx="118" cy="41" rx="8" ry="5" fill="#7CBF70" transform="rotate(-20,118,41)"/>
  <ellipse cx="132" cy="43" rx="8" ry="5" fill="#6BAE62" transform="rotate(16,132,43)"/>
  <ellipse cx="113" cy="48" rx="7" ry="4" fill="#88CF7C" transform="rotate(-35,113,48)"/>
  <ellipse cx="136" cy="46" rx="7" ry="4" fill="#78BA6D" transform="rotate(30,136,46)"/>
  <ellipse cx="121" cy="34" rx="7" ry="4.5" fill="#5A9E50" transform="rotate(-8,121,34)"/>

  <!-- Hanging herb sprig (top center) -->
  <line x1="75" y1="10" x2="75" y2="22" stroke="#8B7355" stroke-width="1.2"/>
  <path d="M 75 22 Q 67 17 62 20" stroke="#6B8C5E" stroke-width="1" fill="none"/>
  <path d="M 75 22 Q 75 14 77 11" stroke="#6B8C5E" stroke-width="1" fill="none"/>
  <path d="M 75 22 Q 83 17 88 20" stroke="#6B8C5E" stroke-width="1" fill="none"/>
  <ellipse cx="61" cy="19" rx="6" ry="3.5" fill="#7CBF70" fill-opacity="0.8" transform="rotate(-25,61,19)"/>
  <ellipse cx="77" cy="10" rx="5.5" ry="3.5" fill="#6BAE62" fill-opacity="0.8" transform="rotate(5,77,10)"/>
  <ellipse cx="89" cy="19" rx="6" ry="3.5" fill="#88CF7C" fill-opacity="0.8" transform="rotate(22,89,19)"/>
  <rect x="72" y="20" width="6" height="4" rx="1.5" fill="#B8956A"/>

  <!-- ── DIVIDER ── -->
  <line x1="150" y1="10" x2="150" y2="105" stroke="url(#divider)" stroke-width="0.9"/>

  <!-- ── WORDMARK ── -->
  <!-- Full app name -->
  <text x="166" y="60" font-size="32" letter-spacing="5" fill="#2B1C0E"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,serif" font-weight="bold">PANTRY COOKING VIBES</text>

  <!-- decorative rule -->
  <line x1="166" y1="70" x2="598" y2="70" stroke="#C4593A" stroke-width="0.7" stroke-opacity="0.35"/>
  <circle cx="382" cy="70" r="2" fill="#C4593A" fill-opacity="0.35"/>

  <!-- Tagline -->
  <text x="166" y="88" font-size="11" letter-spacing="4" fill="#C4593A" fill-opacity="0.85"
    font-family="'Palatino Linotype','Book Antiqua',Palatino,serif">MEAL PLANNER  ·  PANTRY TRACKER</text>
</svg>
