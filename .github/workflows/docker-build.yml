name: docker-build

# PR-time Docker build verification. Builds the image (no push) on PRs that
# touch the Dockerfile or anything baked into it, then runs a smoke command
# inside the resulting image. Catches broken Dockerfile / packaging / entry
# point issues before a release tag is cut.

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "docker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/docker-build.yml"

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + smoke-test image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64, load into local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: pantry-cooking-vibes:pr-${{ github.event.pull_request.number || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Smoke test - meal-cli --help"
        run: |
          docker run --rm --entrypoint meal-cli \
            pantry-cooking-vibes:pr-${{ github.event.pull_request.number || github.sha }} \
            --help

      - name: "Smoke test - meal-cli db-init"
        run: |
          docker run --rm --entrypoint meal-cli \
            -e PANTRY_COOKING_VIBES_DB=/tmp/smoke.db \
            pantry-cooking-vibes:pr-${{ github.event.pull_request.number || github.sha }} \
            db-init --db /tmp/smoke.db

      - name: "Memory regression check (idle RSS budget)"
        run: |
          python scripts/check_image_memory.py \
            --image pantry-cooking-vibes:pr-${{ github.event.pull_request.number || github.sha }} \
            --no-build \
            --max-mb 70 \
            --json mem-check.json

      - name: "Memory check summary"
        if: always()
        run: |
          if [ ! -f mem-check.json ]; then
            echo "mem-check.json not produced — skipping summary" >&2
            exit 0
          fi
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          data = json.load(open("mem-check.json"))
          status = "PASS" if data["passed"] else "FAIL"
          print(f"## Docker image memory: **{status}**")
          print()
          print(f"- Max: **{data['max_mb']:.2f} MiB**")
          print(f"- Mean: {data['mean_mb']:.2f} MiB")
          print(f"- Budget: {data['budget_mb']:.2f} MiB")
          print(f"- Samples: {len(data['samples'])}")
          PY

      - name: "Upload memory check artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-mem-check
          path: mem-check.json
          retention-days: 14
