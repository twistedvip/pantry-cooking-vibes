# Default deployment: pull pre-built multi-arch image from GHCR.
# Image published by .github/workflows/release.yml on every `v*` tag.
#
# Portainer Stack import:
#   1. Stacks → Add stack → "Repository"
#   2. Git URL: https://github.com/twistedvip/pantry-cooking-vibes
#   3. Compose path: docker-compose.yml
#   4. (Optional) env var PCV_TAG=v0.1.0 to pin a specific release
#   5. Deploy. "Pull and redeploy" works because the image lives in a registry.
#
# Local equivalent:
#   docker compose pull && docker compose up -d
#
# Override port:    PCV_PORT=9000 docker compose up -d
# Pin a release:    PCV_TAG=v0.1.0 docker compose up -d
#
# Build-from-source alternative (no registry needed): uncomment the `build:`
# block below and comment out the `image:` line. Then PCV_GIT_REF selects the
# ref (branch/tag/sha) to build, default `main`.
#
# Database persistence:
#   The named volume `meal_data` holds /app/data/store/app.db. It survives
#   `docker compose down`, image pulls, and Portainer "Pull and redeploy".
#   Only `docker compose down -v` or `docker volume rm <stack>_meal_data`
#   wipes it. Back up the SQLite file with `meal-cli db-backup` or by
#   copying /var/lib/docker/volumes/<stack>_meal_data/_data/app.db.

services:
  meal-planner:
    image: ghcr.io/twistedvip/pantry-cooking-vibes:${PCV_TAG:-latest}
    # Build-from-source alternative — see header. Uncomment + comment `image:` above.
    # build:
    #   context: "https://github.com/twistedvip/pantry-cooking-vibes.git#${PCV_GIT_REF:-main}"
    #   dockerfile: Dockerfile
    container_name: meal-planner
    restart: unless-stopped

    environment:
      # Listen port inside the container. Match the host-side mapping below.
      PORT: "${PCV_PORT:-8000}"
      # SQLite file path. Lives inside the named volume mounted at /app/data/store.
      # Both the entrypoint and meal-cli (via Typer envvar=) honor this.
      PANTRY_COOKING_VIBES_DB: "/app/data/store/app.db"

    ports:
      # host:container — change the host side to free up 8000 if needed.
      - "${PCV_PORT:-8000}:${PCV_PORT:-8000}"

    volumes:
      # Persistent SQLite + WAL/SHM sidecar files. See header for backup notes.
      - meal_data:/app/data/store

    # Healthcheck is also defined in the Dockerfile. Repeat here so compose /
    # Portainer respect overrides without rebuilding.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import os, sys, urllib.request
          url = f'http://127.0.0.1:{os.environ.get("PORT","8000")}/healthz'
          sys.exit(0 if urllib.request.urlopen(url, timeout=3).status == 200 else 1)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  meal_data:
    # Default driver = local. Portainer surfaces this in the Volumes view
    # under name `<stack-name>_meal_data`.
